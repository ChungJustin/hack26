<body class="bg-background-warm min-h-screen flex flex-col items-center">

</section>
<!-- Section 1: Needs Assessment -->

<div class="flex items-center gap-xs">
<span class="text-2xl">🍕</span>
<h2 class="font-headline-md text-headline-md text-on-surface">어떤 식구가 필요하신가요?</h2>
</div>
<div class="grid grid-cols-1 gap-md">
<!-- Option 1 -->
<label class="group relative flex items-center p-lg bg-surface-card border-2 border-transparent rounded-xl shadow-[0_8px_30px_rgba(255,138,61,0.08)] cursor-pointer transition-all hover:scale-[1.02] active:scale-95 has-[:checked]:border-primary-container has-[:checked]:bg-secondary-container/30">
<input checked="" class="hidden" type="checkbox"/>
<div class="flex-shrink-0 w-12 h-12 bg-primary-fixed flex items-center justify-center rounded-full mr-md">
<span class="material-symbols-outlined text-primary" data-icon="group">group</span>
</div>
<div class="flex-grow">
<p class="font-body-lg text-body-lg text-on-surface">밥친구 만나기</p>
<p class="font-label-md text-label-md text-on-surface-variant">동성/이성 선택 가능</p>
</div>
<div class="hidden group-has-[:checked]:block">
<span class="material-symbols-outlined text-primary font-bold" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</label>

</div>

<p class="font-body-lg text-body-lg text-on-surface">배달비 아끼기</p>

<section class="mt-lg p-xl bg-primary-container/10 rounded-xl relative overflow-hidden text-center">
